description: |
  # Aerial webOS Screensaver

  Modern fork of [custom-screensaver-aerial](https://github.com/aabytt/custom-screensaver-aerial)

  ## Features

  - 190+ aerial videos from multiple sources
  - Completely redesigned modern UI
  - Simplified enable/disable workflow
  - Toggle screensaver texts individually: title, description, time and date
  - Adjustable text scaling
  - Built-in and custom font support
  - 40+ supported locales
  - Instant screensaver preview for testing
  - Compatible with webOS 5 (2020), webOS 6 (2021), webOS 22 (2022), webOS 23 (2023)

