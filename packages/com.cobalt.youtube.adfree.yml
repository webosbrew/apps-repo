description: |
  # YouTube Cobalt AdFree

  Unofficial Cobalt-based YouTube app for LG webOS TVs with ad blocking and SponsorBlock support.

  ## Features

  * Cobalt-based YouTube TV app
  * Advertisement blocking
  * SponsorBlock integration
  * Can be installed next to the official YouTube app

  **Note:** This is a new Cobalt-based approach and not the legacy WebView-based YouTube AdFree app.
